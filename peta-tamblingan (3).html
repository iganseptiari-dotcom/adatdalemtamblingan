    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1f2e;
      color: #e8eaf0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: #111827;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #f1f5f9;
    }

    header p {
      font-size: 12px;
      color: #64748b;
      margin-top: 2px;
    }

    .badge {
      font-size: 11px;
      background: #1e3a5f;
      color: #60a5fa;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid #2563eb44;
    }

    #map {
      flex: 1;
    }

    .legend {
      background: #111827ee;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.8;
      min-width: 180px;
    }

    .legend h4 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #cbd5e1;
    }

    .legend-line {
      width: 24px;
      height: 3px;
      border-radius: 2px;
    }

    .legend-fill {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      border: 1.5px solid;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .info-panel {
      background: #111827ee;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      max-width: 220px;
    }

    .info-panel h4 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .info-panel p {
      color: #cbd5e1;
      line-height: 1.6;
    }

    .leaflet-control-zoom a {
      background: #1e293b !important;
      color: #e2e8f0 !important;
      border-color: #334155 !important;
    }

    .leaflet-control-zoom a:hover {
      background: #334155 !important;
    }

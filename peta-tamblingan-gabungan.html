      <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div> Desa Adat</div>
      <div class="legend-item"><div class="legend-diamond" style="background:#a78bfa"></div> Pura</div>
      <div class="legend-section">
        <h4>Areal PB-PSWA TWA (estimasi)</h4>
        <div class="legend-item"><div class="legend-solid" style="background:#f9731688;border-color:#f97316"></div> PT Nusa Bali Abadi ★ 20.30 Ha</div>
        <div class="legend-item"><div class="legend-solid" style="background:#22c55e88;border-color:#22c55e"></div> PT Radtya Persada Sentosa 47.6 Ha</div>
        <div class="legend-item"><div class="legend-solid" style="background:#a78bfa88;border-color:#a78bfa"></div> PT Mienza Kreasi Utama 32.5 Ha</div>
        <div class="legend-item"><div class="legend-solid" style="background:#facc1588;border-color:#facc15"></div> PT Taman Wisata Wanagung 10.6 Ha</div>
        <div class="legend-item"><div class="legend-fill" style="background:#0ea5e966;border-color:#38bdf8"></div> Danau Buyan (TWA)</div>
      </div>
    `;
    return div;
  };
  legend.addTo(map);

  const info = L.control({ position:'topleft' });
  info.onAdd = () => {
    const div = L.DomUtil.create('div','info-panel');
    div.innerHTML = `
      <h4>Tentang peta ini</h4>
      <p>Overlay dua sumber: <b>Peta Rupa Bumi</b> (batas kawasan adat) dan <b>foto peta BKSDA Bali</b> (areal PB-PSWA).</p>
      <p style="color:#94a3b8;font-size:11px">⚠ Areal PB-PSWA adalah estimasi visual — batas persil resmi di <a href="https://bhumi.atrbpn.go.id" target="_blank">bhumi.atrbpn.go.id</a></p>
    `;
    return div;
  };
  info.addTo(map);

  // Styles
  const style = document.createElement('style');
  style.textContent = `
    .leaflet-tooltip { background:#111827 !important; border:1px solid #334155 !important; color:#e2e8f0 !important; font-size:11px !important; font-weight:500 !important; box-shadow:none !important; }
    .leaflet-tooltip::before { display:none !important; }
    .leaflet-popup-content-wrapper { background:#1e293b !important; color:#e2e8f0 !important; border:1px solid #334155 !important; border-radius:8px !important; box-shadow:0 4px 20px #0007 !important; }
    .leaflet-popup-tip { background:#1e293b !important; }
    .leaflet-popup-content { font-size:13px !important; line-height:1.6; }
    .leaflet-popup-content b { color:#f1f5f9; }
    .leaflet-popup-content i { color:#94a3b8; }
    .leaflet-control-attribution { background:#111827bb !important; color:#475569 !important; font-size:10px !important; }
    .leaflet-control-attribution a { color:#60a5fa !important; }
    .leaflet-control-layers { background:#1e293b !important; border:1px solid #334155 !important; color:#e2e8f0 !important; border-radius:8px !important; }
    .leaflet-control-layers-base label, .leaflet-control-layers-overlays label { color:#cbd5e1 !important; font-size:12px; }
    .leaflet-control-layers-separator { border-top-color:#334155 !important; }
  `;
  document.head.appendChild(style);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peta Kawasan Adat Catur Desa Tamblingan</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1f2e;
      color: #e8eaf0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: #111827;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #f1f5f9;
    }

    header p {
      font-size: 12px;
      color: #64748b;
      margin-top: 2px;
    }

    .badge {
      font-size: 11px;
      background: #1e3a5f;
      color: #60a5fa;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid #2563eb44;
    }

    #map {
      flex: 1;
    }

    .legend {
      background: #111827ee;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.8;
      min-width: 180px;
    }

    .legend h4 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #cbd5e1;
    }

    .legend-line {
      width: 24px;
      height: 3px;
      border-radius: 2px;
    }

    .legend-fill {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      border: 1.5px solid;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .info-panel {
      background: #111827ee;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      max-width: 220px;
    }

    .info-panel h4 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .info-panel p {
      color: #cbd5e1;
      line-height: 1.6;
    }

    .leaflet-control-zoom a {
      background: #1e293b !important;
      color: #e2e8f0 !important;
      border-color: #334155 !important;
    }

    .leaflet-control-zoom a:hover {
      background: #334155 !important;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Peta Kawasan Adat Catur Desa Tamblingan</h1>
    <p>Gobleg · Munduk · Gesing · Umajero — Kab. Buleleng, Bali</p>
  </div>
  <span class="badge">Data: BIG / OSM</span>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map', {
    center: [-8.255, 115.085],
    zoom: 13,
    zoomControl: true
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 18
  });

  const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics',
    maxZoom: 19
  }).addTo(map);

  const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 18
  });

  const baseMaps = {
    "Citra Satelit (Esri)": satLayer,
    "Peta Jalan (OSM)": osmLayer
  };

  // Danau Tamblingan approximate polygon
  const danauTamblingan = L.polygon([
    [-8.2445, 115.0748],
    [-8.2438, 115.0802],
    [-8.2458, 115.0855],
    [-8.2490, 115.0878],
    [-8.2528, 115.0882],
    [-8.2558, 115.0860],
    [-8.2568, 115.0822],
    [-8.2550, 115.0785],
    [-8.2518, 115.0760],
    [-8.2478, 115.0742],
    [-8.2445, 115.0748]
  ], {
    color: '#38bdf8',
    fillColor: '#0ea5e9',
    fillOpacity: 0.45,
    weight: 1.5
  }).addTo(map).bindPopup('<b>Danau Tamblingan</b><br>Kawasan suci masyarakat adat');

  // Alas Mertajati / hutan adat approximate boundary
  const hutanAdat = L.polygon([
    [-8.220, 115.050],
    [-8.215, 115.075],
    [-8.218, 115.095],
    [-8.228, 115.108],
    [-8.240, 115.115],
    [-8.255, 115.118],
    [-8.268, 115.110],
    [-8.278, 115.095],
    [-8.282, 115.075],
    [-8.275, 115.055],
    [-8.260, 115.043],
    [-8.242, 115.040],
    [-8.228, 115.044],
    [-8.220, 115.050]
  ], {
    color: '#22c55e',
    fillColor: '#16a34a',
    fillOpacity: 0.18,
    weight: 2,
    dashArray: '6 4'
  }).addTo(map).bindPopup('<b>Kawasan Hutan Adat</b><br>Alas Mertajati — 1.336 ha<br><i>Sumber air utama Bali Utara</i>');

  // Batas luar Catur Desa approximate
  const batasCaturDesa = L.polygon([
    [-8.205, 115.045],
    [-8.200, 115.072],
    [-8.205, 115.100],
    [-8.215, 115.125],
    [-8.230, 115.138],
    [-8.252, 115.142],
    [-8.272, 115.135],
    [-8.290, 115.118],
    [-8.298, 115.095],
    [-8.295, 115.065],
    [-8.280, 115.045],
    [-8.258, 115.032],
    [-8.232, 115.030],
    [-8.212, 115.035],
    [-8.205, 115.045]
  ], {
    color: '#f97316',
    fillColor: 'transparent',
    weight: 2.5,
    dashArray: '8 5'
  }).addTo(map).bindPopup('<b>Batas Luar Catur Desa</b><br>Gobleg · Munduk · Gesing · Umajero');

  // Desa markers
  const desas = [
    { name: 'Desa Munduk', lat: -8.248, lng: 115.052, desc: 'Desa induk Catur Desa' },
    { name: 'Desa Gobleg', lat: -8.228, lng: 115.068, desc: 'Desa tertua, leluhur Catur Desa' },
    { name: 'Desa Gesing', lat: -8.265, lng: 115.088, desc: 'Salah satu dari empat desa adat' },
    { name: 'Desa Umajero', lat: -8.242, lng: 115.108, desc: 'Salah satu dari empat desa adat' }
  ];

  const desaIcon = L.divIcon({
    className: '',
    html: '<div style="width:10px;height:10px;background:#f97316;border:2px solid #fff;border-radius:50%;box-shadow:0 0 4px #0008"></div>',
    iconSize: [10, 10],
    iconAnchor: [5, 5]
  });

  desas.forEach(d => {
    L.marker([d.lat, d.lng], { icon: desaIcon })
      .addTo(map)
      .bindPopup(`<b>${d.name}</b><br>${d.desc}`)
      .bindTooltip(d.name, { permanent: true, direction: 'top', offset: [0, -8],
        className: 'leaflet-tooltip-dark' });
  });

  // Pura marker
  const puraIcon = L.divIcon({
    className: '',
    html: '<div style="width:12px;height:12px;background:#a78bfa;border:2px solid #fff;border-radius:2px;box-shadow:0 0 4px #0008;transform:rotate(45deg)"></div>',
    iconSize: [12, 12],
    iconAnchor: [6, 6]
  });

  L.marker([-8.2468, 115.0835], { icon: puraIcon })
    .addTo(map)
    .bindPopup('<b>Pura Dalem Tamblingan</b><br>Pura agung di tepi danau')
    .bindTooltip('Pura Dalem Tamblingan', { permanent: false, direction: 'top' });

  // Legend control
  const legend = L.control({ position: 'bottomright' });
  legend.onAdd = () => {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = `
      <h4>Legenda</h4>
      <div class="legend-item"><div class="legend-line" style="background:#f97316;border-top:2px dashed #f97316;height:0;border-radius:0"></div> Batas Catur Desa</div>
      <div class="legend-item"><div class="legend-fill" style="background:#16a34a22;border-color:#22c55e"></div> Hutan Adat (Alas Mertajati)</div>
      <div class="legend-item"><div class="legend-fill" style="background:#0ea5e966;border-color:#38bdf8"></div> Danau Tamblingan</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f97316;border:2px solid #fff"></div> Desa Adat</div>
      <div class="legend-item"><div style="width:12px;height:12px;background:#a78bfa;border:2px solid #fff;transform:rotate(45deg);border-radius:2px"></div> Pura</div>
    `;
    return div;
  };
  legend.addTo(map);

  // Info control
  const info = L.control({ position: 'topleft' });
  info.onAdd = () => {
    const div = L.DomUtil.create('div', 'info-panel');
    div.innerHTML = `
      <h4>Tentang kawasan</h4>
      <p>Masyarakat Adat Dalem Tamblingan telah menjaga kawasan ini sejak abad ke-10. Hutan Alas Mertajati (1.336 ha) adalah sumber air utama Bali Utara.</p>
    `;
    return div;
  };
  info.addTo(map);

  L.control.layers(baseMaps, {}, { position: 'topright' }).addTo(map);

  // Tooltip style override
  const style = document.createElement('style');
  style.textContent = `
    .leaflet-tooltip {
      background: #111827 !important;
      border: 1px solid #334155 !important;
      color: #e2e8f0 !important;
      font-size: 11px !important;
      font-weight: 500 !important;
      box-shadow: none !important;
    }
    .leaflet-tooltip::before { display: none !important; }
    .leaflet-popup-content-wrapper {
      background: #1e293b !important;
      color: #e2e8f0 !important;
      border: 1px solid #334155 !important;
      border-radius: 8px !important;
      box-shadow: 0 4px 16px #0005 !important;
    }
    .leaflet-popup-tip { background: #1e293b !important; }
    .leaflet-popup-content { font-size: 13px !important; line-height: 1.6; }
    .leaflet-popup-content b { color: #f1f5f9; }
    .leaflet-popup-content i { color: #94a3b8; font-style: italic; }
    .leaflet-control-attribution { background: #111827bb !important; color: #475569 !important; font-size: 10px !important; }
    .leaflet-control-attribution a { color: #60a5fa !important; }
    .leaflet-control-layers { background: #1e293b !important; border: 1px solid #334155 !important; color: #e2e8f0 !important; border-radius: 8px !important; }
    .leaflet-control-layers label { color: #cbd5e1 !important; font-size: 12px; }
  `;
  document.head.appendChild(style);
</script>

</body>
</html>

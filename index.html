<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peta Desain Tapak & Sebaran Areal PB-PSWA TWA Danau Buyan–Tamblingan</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1f2e; color: #e8eaf0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 10px 18px; background: #111827; border-bottom: 1px solid #2d3748; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; flex-wrap: wrap; gap: 8px; }
    header h1 { font-size: 13px; font-weight: 700; color: #f1f5f9; letter-spacing: 0.01em; }
    header p { font-size: 11px; color: #64748b; margin-top: 2px; }
    .badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .badge { font-size: 10.5px; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
    .badge-blue { background: #1e3a5f; color: #60a5fa; border: 1px solid #2563eb44; }
    .badge-red { background: #450a0a; color: #f87171; border: 1px solid #dc262644; }
    #map { flex: 1; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #1e293bdd; border: 1px solid #334155; border-radius: 10px; padding: 20px 30px; font-size: 13px; color: #94a3b8; z-index: 9999; text-align: center; }
    #loading span { display: block; font-size: 20px; margin-bottom: 6px; }

    .legend { background: #111827ee; border: 1px solid #2d3748; border-radius: 8px; padding: 11px 14px; font-size: 11.5px; min-width: 205px; }
    .legend h4 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: #94a3b8; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #1e3a5f; }
    .legend-section { margin-top: 7px; }
    .legend-item { display: flex; align-items: center; gap: 8px; color: #cbd5e1; margin-bottom: 3px; line-height: 1.4; }
    .lsq { width: 13px; height: 13px; border-radius: 3px; border: 2px solid; flex-shrink: 0; }
    .lln { width: 22px; height: 0; border-top: 2.5px; flex-shrink: 0; }
    .ldt { width: 9px; height: 9px; border-radius: 50%; border: 2px solid white; flex-shrink: 0; }

    .info-panel { background: #111827ee; border: 1px solid #2d3748; border-radius: 8px; padding: 11px 14px; font-size: 11.5px; max-width: 230px; }
    .info-panel h4 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; margin-bottom: 5px; }
    .info-panel p { color: #cbd5e1; line-height: 1.55; margin-bottom: 4px; }
    .info-panel a { color: #60a5fa; }
    .leaflet-control-zoom a { background: #1e293b !important; color: #e2e8f0 !important; border-color: #334155 !important; }
    .leaflet-control-zoom a:hover { background: #334155 !important; }
    @keyframes pulse { 0%{width:0;height:0;opacity:0.8} 100%{width:50px;height:50px;opacity:0} }
  </style>
</head>
<body>
<header>
  <div>
    <h1>PETA DESAIN TAPAK & SEBARAN AREAL PB-PSWA DI TWA DANAU BUYAN DANAU TAMBLINGAN</h1>
    <p>Kab. Buleleng & Kab. Tabanan — Provinsi Bali · Luas TWA: 1.847,38 Ha</p>
  </div>
  <div class="badges">
    <span class="badge badge-blue">Batas TWA: OSM + KLHK</span>
    <span class="badge badge-red">⚠ Areal PSWA: Estimasi visual dari dok. BKSDA</span>
  </div>
</header>
<div id="map"></div>
<div id="loading"><span>🗺️</span>Memuat data dari OpenStreetMap…</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', { center: [-8.225, 115.130], zoom: 13 });

const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Tiles © Esri — Maxar, Earthstar Geographics', maxZoom: 19
}).addTo(map);
const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 18
});

// ── Dari foto peta BKSDA:
// Buyan  = kiri (barat), besar, ~115.07–115.10 BT, ~8.19–8.23 LS
// Tamblingan = kanan (timur), kecil, ~115.10–115.13 BT, ~8.23–8.27 LS

// ─── DANAU BUYAN (dari OSM relation 5388756 coords, difit manual) ───
const coordsBuyan = [
  [-8.1870,115.0670],[-8.1855,115.0730],[-8.1855,115.0800],
  [-8.1870,115.0860],[-8.1900,115.0910],[-8.1940,115.0945],
  [-8.1985,115.0965],[-8.2035,115.0965],[-8.2075,115.0945],
  [-8.2110,115.0910],[-8.2135,115.0865],[-8.2140,115.0810],
  [-8.2125,115.0755],[-8.2095,115.0705],[-8.2055,115.0670],
  [-8.2010,115.0650],[-8.1960,115.0648],[-8.1912,115.0658],
  [-8.1870,115.0670]
];

// ─── DANAU TAMBLINGAN ───
const coordsTamblingan = [
  [-8.2375,115.1055],[-8.2355,115.1095],[-8.2350,115.1145],
  [-8.2365,115.1195],[-8.2395,115.1232],[-8.2432,115.1248],
  [-8.2472,115.1243],[-8.2505,115.1218],[-8.2525,115.1178],
  [-8.2528,115.1130],[-8.2510,115.1085],[-8.2478,115.1052],
  [-8.2435,115.1038],[-8.2398,115.1040],[-8.2375,115.1055]
];

// ─── BATAS TWA / KALDERA (dari citra: lingkaran kecoklatan) ───
// Menyesuaikan tampilan peta BKSDA: batas kaldera melingkupi kedua danau
const batasTWA = [
  [-8.1750,115.0600],[-8.1720,115.0750],[-8.1720,115.0900],
  [-8.1740,115.1000],[-8.1760,115.1100],[-8.1790,115.1200],
  [-8.1830,115.1290],[-8.1880,115.1360],[-8.1950,115.1410],
  [-8.2030,115.1440],[-8.2115,115.1455],[-8.2200,115.1450],
  [-8.2280,115.1425],[-8.2350,115.1385],[-8.2410,115.1330],
  [-8.2455,115.1265],[-8.2488,115.1190],[-8.2505,115.1110],
  [-8.2510,115.1025],[-8.2500,115.0940],[-8.2475,115.0855],
  [-8.2440,115.0775],[-8.2390,115.0702],[-8.2330,115.0642],
  [-8.2265,115.0597],[-8.2195,115.0568],[-8.2120,115.0553],
  [-8.2045,115.0553],[-8.1972,115.0565],[-8.1902,115.0590],
  [-8.1838,115.0625],[-8.1785,115.0612],[-8.1750,115.0600]
];

// ─── AREAL PB-PSWA ─── (disesuaikan dengan posisi hijau di foto)
// Dari foto: 4 patch hijau di tepi UTARA dan TIMUR danau
// 1. PT Radtya Persada Sentosa – Handara 2 (47.618 Ha) → tepi utara Buyan, besar memanjang
const aHandara2 = [
  [-8.1760,115.0720],[-8.1748,115.0780],[-8.1752,115.0860],
  [-8.1768,115.0940],[-8.1800,115.0985],[-8.1830,115.0995],
  [-8.1870,115.0980],[-8.1870,115.0940],[-8.1852,115.0898],
  [-8.1838,115.0842],[-8.1832,115.0778],[-8.1838,115.0722],
  [-8.1812,115.0705],[-8.1782,115.0708],[-8.1760,115.0720]
];

// 2. PT Nusa Bali Abadi – Buyan 2 (20.30 Ha) → tepi timur Buyan / antara dua danau
const aBuyan2 = [
  [-8.2088,115.0980],[-8.2075,115.1010],[-8.2080,115.1048],
  [-8.2102,115.1075],[-8.2130,115.1085],[-8.2158,115.1072],
  [-8.2170,115.1040],[-8.2162,115.1005],[-8.2140,115.0978],
  [-8.2112,115.0968],[-8.2088,115.0980]
];

// 3. PT Mienza Kreasi Utama – Kembang Mertha 2 (32.54 Ha) → tepi timur-selatan Tamblingan
const aKembangMertha2 = [
  [-8.2465,115.1220],[-8.2445,115.1258],[-8.2448,115.1302],
  [-8.2470,115.1338],[-8.2505,115.1352],[-8.2540,115.1338],
  [-8.2560,115.1300],[-8.2558,115.1255],[-8.2535,115.1218],
  [-8.2500,115.1202],[-8.2465,115.1220]
];

// 4. PT Taman Wisata Wanagung – Bukit Munggu 2 (10.6 Ha) → tepi barat/selatan Tamblingan (kecil)
const aBukitMunggu2 = [
  [-8.2428,115.1045],[-8.2415,115.1068],[-8.2418,115.1098],
  [-8.2438,115.1118],[-8.2460,115.1122],[-8.2478,115.1105],
  [-8.2478,115.1075],[-8.2458,115.1050],[-8.2435,115.1042],
  [-8.2428,115.1045]
];

// ─── DRAW LAYERS ───
const lBuyan = L.polygon(coordsBuyan, {
  color:'#60a5fa', fillColor:'#3b82f6', fillOpacity:0.55, weight:1.5
}).addTo(map).bindPopup('<b>Danau Buyan</b><br>±327 Ha · TWA Buyan–Tamblingan<br><i style="color:#94a3b8">Sumber: OSM</i>');

const lTamblingan = L.polygon(coordsTamblingan, {
  color:'#60a5fa', fillColor:'#3b82f6', fillOpacity:0.55, weight:1.5
}).addTo(map).bindPopup('<b>Danau Tamblingan</b><br>Kawasan suci adat Catur Desa<br><i style="color:#94a3b8">Sumber: OSM</i>');

const lTWA = L.polygon(batasTWA, {
  color:'#b45309', fillColor:'transparent', weight:2.5, dashArray:'7 4'
}).addTo(map).bindPopup('<b>Batas Kawasan TWA</b><br>TWA Danau Buyan–Danau Tamblingan<br>Luas: 1.847,38 Ha<br>SK Menhut No.2847/2014');

// PSWA polygons
const pswaStyle = (color) => ({ color, fillColor:color, fillOpacity:0.60, weight:2.5 });

const lHandara = L.polygon(aHandara2, pswaStyle('#22c55e'))
  .addTo(map)
  .bindPopup(`<b style="color:#22c55e">PT Radtya Persada Sentosa</b><br><b>Ruang Usaha Handara 2</b><br>Luas: <b>47.618 Ha</b><br><i style="color:#94a3b8">PB-PSWA · TWA Buyan–Tamblingan</i>`);

const lBuyan2 = L.polygon(aBuyan2, pswaStyle('#22c55e'))
  .addTo(map)
  .bindPopup(`<b style="color:#22c55e">PT Nusa Bali Abadi</b><br><b>Ruang Usaha Buyan 2</b><br>Luas: <b>20.30 Ha</b><br>SK Menhut No. 283/Menhut-II/2007<br><i style="color:#94a3b8">PB-PSWA · TWA Buyan–Tamblingan</i>`);

const lMienza = L.polygon(aKembangMertha2, pswaStyle('#22c55e'))
  .addTo(map)
  .bindPopup(`<b style="color:#22c55e">PT Mienza Kreasi Utama</b><br><b>Ruang Usaha Kembang Mertha 2</b><br>Luas: <b>32.54 Ha</b><br><i style="color:#94a3b8">PB-PSWA · TWA Buyan–Tamblingan</i>`);

const lWanagung = L.polygon(aBukitMunggu2, pswaStyle('#22c55e'))
  .addTo(map)
  .bindPopup(`<b style="color:#22c55e">PT Taman Wisata Wanagung</b><br><b>Ruang Usaha Bukit Munggu 2</b><br>Luas: <b>10.6 Ha</b><br><i style="color:#94a3b8">PB-PSWA · TWA Buyan–Tamblingan</i>`);

// Label markers untuk PSWA
const labelIcon = (nama, luas) => L.divIcon({
  className:'',
  html:`<div style="background:#111827dd;border:1px solid #22c55e;border-radius:5px;padding:3px 7px;font-size:10.5px;color:#e2e8f0;white-space:nowrap;line-height:1.4"><b style="color:#4ade80">${nama}</b><br>${luas}</div>`,
  iconAnchor:[0,0]
});

L.marker([-8.181, 115.082], {icon:labelIcon('PT Radtya Persada Sentosa','Handara 2 · 47.618 Ha')}).addTo(map);
L.marker([-8.212, 115.103], {icon:labelIcon('PT Nusa Bali Abadi','Buyan 2 · 20.30 Ha')}).addTo(map);
L.marker([-8.251, 115.133], {icon:labelIcon('PT Mienza Kreasi Utama','Kembang Mertha 2 · 32.54 Ha')}).addTo(map);
L.marker([-8.244, 115.107], {icon:labelIcon('PT Taman Wisata Wanagung','Bukit Munggu 2 · 10.6 Ha')}).addTo(map);

// Fetch TWA boundary from Overpass (OSM) at runtime in browser
async function fetchOSMData() {
  try {
    const overpassQuery = `
      [out:json][timeout:30];
      (
        relation["name"="Danau Buyan"]["natural"="water"];
        relation["name"="Danau Tamblingan"]["natural"="water"];
        way["name"="Danau Buyan"]["natural"="water"];
        way["name"="Danau Tamblingan"]["natural"="water"];
        way["name"="Danau Buyan"];
        way["name"="Danau Tamblingan"];
      );
      out geom;
    `;
    const url = 'https://overpass-api.de/api/interpreter';
    const resp = await fetch(url, {
      method:'POST',
      body: 'data=' + encodeURIComponent(overpassQuery)
    });
    if (!resp.ok) throw new Error('Overpass error');
    const data = await resp.json();

    // Process OSM geometries
    data.elements.forEach(el => {
      if (el.type === 'way' && el.geometry) {
        const coords = el.geometry.map(p => [p.lat, p.lon]);
        const name = el.tags?.name || 'Danau';
        // Replace our estimated polygons with real OSM data
        L.polygon(coords, {
          color:'#60a5fa', fillColor:'#3b82f6', fillOpacity:0.55, weight:1.5
        }).addTo(map).bindPopup(`<b>${name}</b><br><i style="color:#94a3b8">Sumber: OpenStreetMap</i>`);
      }
    });
    document.getElementById('loading').style.display = 'none';
  } catch(e) {
    console.warn('OSM fetch failed, using estimated data', e);
    document.getElementById('loading').style.display = 'none';
  }
}

// Also fetch KLHK TWA boundary via CORS proxy approach
async function fetchKLHKBoundary() {
  try {
    // KLHK SIGAP ArcGIS REST — query bbox Buyan-Tamblingan
    const bbox = '115.04,-8.27,115.16,-8.16';
    const url = `https://geoportal.menlhk.go.id/server/rest/services/SIGAP_Interaktif/Kawasan_Hutan/MapServer/0/query?geometry=${bbox}&geometryType=esriGeometryEnvelope&spatialRel=esriSpatialRelIntersects&outFields=NAMOBJ,FUNGSI,LUAS&where=FUNGSI%3D'TWA'&f=geojson`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error();
    const gj = await resp.json();
    if (gj.features?.length) {
      L.geoJSON(gj, {
        style: { color:'#b45309', fillColor:'transparent', weight:3 },
        onEachFeature: (f, layer) => {
          const p = f.properties;
          layer.bindPopup(`<b>${p.NAMOBJ||'TWA'}</b><br>Fungsi: ${p.FUNGSI}<br>Luas: ${p.LUAS?.toFixed(2)||'–'} Ha<br><i style="color:#94a3b8">Sumber: SIGAP KLHK</i>`);
          // Remove estimated TWA outline if real data loaded
          map.removeLayer(lTWA);
        }
      }).addTo(map);
    }
  } catch(e) {
    console.warn('KLHK fetch failed, using estimated TWA boundary');
  }
}

fetchOSMData();
fetchKLHKBoundary();
setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 8000);

// ─── LAYER CONTROL ───
L.control.layers(
  {'🛰 Citra Satelit (Esri)': sat, '🗺 Peta Jalan (OSM)': osm},
  {
    'Batas TWA (estimasi)': lTWA,
    'Danau Buyan': lBuyan,
    'Danau Tamblingan': lTamblingan,
    'Handara 2 – PT Radtya': lHandara,
    'Buyan 2 – PT Nusa Bali': lBuyan2,
    'Kembang Mertha 2 – PT Mienza': lMienza,
    'Bukit Munggu 2 – PT Wanagung': lWanagung,
  },
  {position:'topright', collapsed:true}
).addTo(map);

// ─── LEGEND ───
const legend = L.control({position:'bottomright'});
legend.onAdd = () => {
  const d = L.DomUtil.create('div','legend');
  d.innerHTML = `
    <h4>Keterangan</h4>
    <div class="legend-item"><div class="lsq" style="background:#3b82f666;border-color:#60a5fa"></div>Danau Buyan & Tamblingan</div>
    <div class="legend-item"><div class="lln" style="border-top:2.5px dashed #b45309"></div>Batas Kawasan TWA</div>
    <div class="legend-section">
      <h4>Areal PB-PSWA (estimasi)</h4>
      <div class="legend-item"><div class="lsq" style="background:#22c55e88;border-color:#22c55e"></div>PT Radtya Persada Sentosa · 47.6 Ha</div>
      <div class="legend-item"><div class="lsq" style="background:#22c55e88;border-color:#22c55e"></div>PT Nusa Bali Abadi · 20.3 Ha</div>
      <div class="legend-item"><div class="lsq" style="background:#22c55e88;border-color:#22c55e"></div>PT Mienza Kreasi Utama · 32.5 Ha</div>
      <div class="legend-item"><div class="lsq" style="background:#22c55e88;border-color:#22c55e"></div>PT Taman Wisata Wanagung · 10.6 Ha</div>
    </div>
  `;
  return d;
};
legend.addTo(map);

// ─── INFO PANEL ───
const info = L.control({position:'topleft'});
info.onAdd = () => {
  const d = L.DomUtil.create('div','info-panel');
  d.innerHTML = `
    <h4>Tentang Peta</h4>
    <p>Overlay areal konsesi PB-PSWA di TWA Danau Buyan–Tamblingan. Peta menampilkan lokasi 4 ruang usaha yang diberikan kepada perusahaan swasta di dalam kawasan TWA.</p>
    <p style="color:#f87171;font-size:10.5px">⚠ Posisi areal PSWA adalah estimasi visual dari dokumen BKSDA Bali. Batas persil resmi di <a href="https://oss.go.id" target="_blank">oss.go.id</a> atau <a href="https://bhumi.atrbpn.go.id" target="_blank">bhumi.atrbpn.go.id</a></p>
  `;
  return d;
};
info.addTo(map);

// ─── DARK THEME ───
const s = document.createElement('style');
s.textContent = `
  .leaflet-tooltip,.leaflet-tooltip-pane { background:#111827 !important; border:1px solid #334155 !important; color:#e2e8f0 !important; font-size:11px !important; box-shadow:none !important; }
  .leaflet-tooltip::before { display:none !important; }
  .leaflet-popup-content-wrapper { background:#1e293b !important; color:#e2e8f0 !important; border:1px solid #334155 !important; border-radius:8px !important; box-shadow:0 4px 20px #0008 !important; }
  .leaflet-popup-tip { background:#1e293b !important; }
  .leaflet-popup-content { font-size:12.5px !important; line-height:1.6; }
  .leaflet-control-attribution { background:#111827bb !important; color:#475569 !important; font-size:10px !important; }
  .leaflet-control-attribution a { color:#60a5fa !important; }
  .leaflet-control-layers { background:#1e293b !important; border:1px solid #334155 !important; border-radius:8px !important; }
  .leaflet-control-layers-base label,.leaflet-control-layers-overlays label { color:#cbd5e1 !important; font-size:11.5px; }
  .leaflet-control-layers-separator { border-top-color:#334155 !important; }
  .leaflet-control-layers-toggle { background-color:#1e293b !important; }
`;
document.head.appendChild(s);
</script>
</body>
</html>
